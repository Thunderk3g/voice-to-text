# Alembic configuration for v2t.
#
# The actual DSN is injected at runtime by `app/db/migrations/env.py`, which
# reads `database_url_sync` from `app.core.config.Settings`. The placeholder
# below exists only so Alembic does not error on a missing key.

[alembic]
script_location = app/db/migrations
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = driver://user:pass@host/db

# Use a deterministic file naming scheme.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

[post_write_hooks]
# (intentionally empty) — formatting is enforced by repo-wide pre-commit hooks.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
