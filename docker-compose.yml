# =========================================================================
# v2t — full local stack
# Runs on macOS (Apple Silicon), Linux, and WSL2.
#
# LLM:        native Ollama on the host (Metal-accelerated on Mac), reached
#             from containers via host.docker.internal. No LLM container —
#             calls go out via LLM_BASE_URL / LLM_API_KEY in .env.
# STT:        Sarvam.ai (hosted, Indic-accurate) OR open-source faster-whisper
#             on CPU — selected by STT_PROVIDER. (No Servo AI dependency.)
# Embeddings: local multilingual-e5-large on CPU by default (EMBEDDING_PROVIDER
#             =local). The dedicated `worker-embed` service consumes the
#             embedding queue (gpu.heavy) on CPU, isolated from worker-cpu.
# worker-gpu: opt-in only (CUDA) — a GPU alternative to worker-embed. Behind the
#             "gpu" compose profile, does NOT start by default (Mac can't pass
#             through the GPU). Enable with: docker compose --profile gpu up
#             (scale worker-embed to 0 if you want GPU-only embedding).
#
# Usage:
#   cp .env.opensource .env   # or: cp .env.sarvam .env   (set SARVAM_API_KEY)
#   docker compose up -d --build
#   python -m app.scripts.seed_data --api-url http://localhost:8080
# =========================================================================

x-app-env: &app-env
  env_file: .env

x-gpu-deploy: &gpu-deploy
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

networks:
  v2t-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  hf_cache:

services:

  # -----------------------------------------------------------------------
  # Postgres + pgvector + pgcrypto
  # -----------------------------------------------------------------------
  postgres:
    build:
      context: ./infra/postgres
      dockerfile: Dockerfile
    image: v2t/postgres:local
    container_name: v2t-postgres
    restart: unless-stopped
    <<: *app-env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - v2t-net

  # -----------------------------------------------------------------------
  # Redis (Celery broker + result backend, embedding cache)
  # -----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: v2t-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - v2t-net

  # -----------------------------------------------------------------------
  # MinIO — S3-compatible object storage (transcript files + artifacts)
  # -----------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: v2t-minio
    restart: unless-stopped
    <<: *app-env
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - v2t-net

  minio-setup:
    image: minio/mc:latest
    container_name: v2t-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    <<: *app-env
    entrypoint: >
      /bin/sh -c "
      set -e;
      mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY};
      mc mb --ignore-existing local/$${MINIO_BUCKET_TRANSCRIPTS};
      mc mb --ignore-existing local/$${MINIO_BUCKET_ARTIFACTS};
      mc anonymous set download local/$${MINIO_BUCKET_ARTIFACTS} || true;
      echo 'minio-setup: buckets ready';
      "
    restart: "no"
    networks:
      - v2t-net

  # -----------------------------------------------------------------------
  # FastAPI — REST API
  # -----------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: v2t/api:local
    container_name: v2t-api
    restart: unless-stopped
    <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Share the HF model cache with the workers so the API's in-process e5
      # query-embedder (used by POST /search) loads the already-downloaded
      # model instead of re-fetching ~2GB on the first request — which
      # otherwise blocks long enough for the frontend proxy to ECONNRESET.
      - hf_cache:/app/.cache/huggingface
    command:
      - "sh"
      - "-c"
      - "alembic upgrade head && uvicorn app.api.main:app --host 0.0.0.0 --port 8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - v2t-net

  # -----------------------------------------------------------------------
  # Celery worker — CPU queue (ingest, extract, cluster, canonicalize,
  # memory edges, feedback). LLM calls go out to Groq over HTTPS.
  # -----------------------------------------------------------------------
  worker-cpu:
    build:
      context: .
      dockerfile: Dockerfile.worker-cpu
    image: v2t/worker-cpu:local
    container_name: v2t-worker-cpu
    restart: unless-stopped
    <<: *app-env
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Persist the Whisper/HF model cache so the ~3GB large-v3 download survives
    # container recreates (rebuilds, Docker restarts). The cpu worker resolves
    # the HF hub cache to /app/.cache/huggingface.
    volumes:
      - hf_cache:/app/.cache/huggingface
    # FAST lane: does NOT consume `stt.heavy`, so slow local-Whisper jobs
    # (routed there by start_call_pipeline) never land here — this worker stays
    # available for fast cloud (Sarvam) transcription + the light downstream
    # stages (extract/cluster/canon) and so is never starved. The heavy
    # embedding queue (`gpu.heavy`) is intentionally NOT consumed here — it is
    # isolated on the dedicated `worker-embed` service so the ~2GB e5 model
    # load never competes with these light stages.
    # -E emits task events so Flower's live view (active/processed tasks) works.
    command: ["celery", "-A", "app.workers.celery_app", "worker",
              "--loglevel=INFO", "-Q", "celery,default", "--concurrency=2", "-E"]
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d celery@$$(hostname) >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - v2t-net

  # -----------------------------------------------------------------------
  # Celery worker — dedicated HEAVY lane for slow, CPU-bound local Whisper
  # transcription (queue `stt.heavy`). Isolating Whisper here keeps it from
  # saturating worker-cpu and starving fast cloud (Sarvam) transcription +
  # the light downstream stages. It also consumes the fast lanes so it adds
  # general throughput when no Whisper job is running. concurrency=2: each
  # fork loads its own ~3GB large-v3 (cache is per-process); >2 risks OOM.
  # -----------------------------------------------------------------------
  worker-stt:
    build:
      context: .
      dockerfile: Dockerfile.worker-cpu
    image: v2t/worker-cpu:local
    container_name: v2t-worker-stt
    restart: unless-stopped
    <<: *app-env
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - hf_cache:/app/.cache/huggingface
    command: ["celery", "-A", "app.workers.celery_app", "worker",
              "--loglevel=INFO", "-Q", "stt.heavy,celery,default", "--concurrency=2", "-E"]
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d celery@$$(hostname) >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - v2t-net

  # -----------------------------------------------------------------------
  # Celery worker — dedicated EMBEDDING lane (queue `gpu.heavy`) on CPU.
  # This is the embedding consumer on no-GPU hosts. Isolating the ~2GB
  # multilingual-e5-large load here (concurrency=1 → one model copy) keeps it
  # from competing with the light extract/cluster/canon stages on worker-cpu.
  # Reuses the worker-cpu image (same pinned torch/sentence-transformers).
  # When the opt-in `worker-gpu` (profile "gpu") is enabled it ALSO consumes
  # `gpu.heavy`; to embed on GPU only, scale this service to 0.
  # -----------------------------------------------------------------------
  worker-embed:
    build:
      context: .
      dockerfile: Dockerfile.worker-cpu
    image: v2t/worker-cpu:local
    container_name: v2t-worker-embed
    restart: unless-stopped
    <<: *app-env
    environment:
      # Force CPU regardless of the .env default so this worker never tries to
      # load the model on a GPU that isn't present.
      EMBEDDING_DEVICE: cpu
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - hf_cache:/app/.cache/huggingface
    command: ["celery", "-A", "app.workers.celery_app", "worker",
              "--loglevel=INFO", "-Q", "gpu.heavy", "--concurrency=1", "-E"]
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d celery@$$(hostname) >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - v2t-net

  # -----------------------------------------------------------------------
  # Celery worker — GPU queue (embedding). Opt-in alternative to worker-embed
  # for hosts with an NVIDIA GPU; consumes the same `gpu.heavy` queue.
  # -----------------------------------------------------------------------
  worker-gpu:
    build:
      context: .
      dockerfile: Dockerfile.worker-gpu
    image: v2t/worker-gpu:local
    container_name: v2t-worker-gpu
    restart: unless-stopped
    # Opt-in only: CUDA worker. Not started by default (Mac can't pass through
    # the GPU). Enable on NVIDIA/Linux with: docker compose --profile gpu up
    profiles: ["gpu"]
    # Single merge key: combine env-file + GPU deploy reservation. Two separate
    # `<<:` keys in one mapping is a duplicate-key error in strict YAML parsers.
    <<: [*app-env, *gpu-deploy]
    environment:
      # Pin to CUDA so this worker loads on the GPU even though the shared .env
      # defaults EMBEDDING_DEVICE=cpu for the no-GPU worker-embed path.
      EMBEDDING_DEVICE: cuda
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - hf_cache:/home/v2t/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d celery@$$(hostname) >/dev/null 2>&1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    networks:
      - v2t-net

  # -----------------------------------------------------------------------
  # Celery beat — periodic scheduler (daily recluster)
  # -----------------------------------------------------------------------
  beat:
    build:
      context: .
      dockerfile: Dockerfile.beat
    image: v2t/beat:local
    container_name: v2t-beat
    restart: unless-stopped
    <<: *app-env
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - v2t-net

  # -----------------------------------------------------------------------
  # Flower — Celery monitoring UI
  # -----------------------------------------------------------------------
  flower:
    image: mher/flower:2.0
    container_name: v2t-flower
    restart: unless-stopped
    <<: *app-env
    depends_on:
      redis:
        condition: service_healthy
    command: ["celery", "--broker=${CELERY_BROKER_URL}", "flower", "--port=5555"]
    ports:
      - "5555:5555"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5555/healthcheck || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - v2t-net

  # -----------------------------------------------------------------------
  # Next.js dashboard
  # -----------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: v2t/frontend:local
    container_name: v2t-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:8080
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - v2t-net

  # -----------------------------------------------------------------------
  # OpenTelemetry collector — disabled by default.
  # -----------------------------------------------------------------------
  # otel-collector:
  #   image: otel/opentelemetry-collector:latest
  #   container_name: v2t-otel
  #   restart: unless-stopped
  #   command: ["--config=/etc/otel/otel-config.yaml"]
  #   volumes:
  #     - ./infra/otel/otel-config.yaml:/etc/otel/otel-config.yaml:ro
  #   ports:
  #     - "4317:4317"
  #     - "4318:4318"
